<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 小说阅读器</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }
        .login-box {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 380px;
            text-align: center;
        }
        .login-box h2 {
            border-bottom: none;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #CCC;
            border-radius: 6px;
            background-color: #FFF;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .login-box input[type="password"]:focus {
            border-color: var(--primary-btn);
        }
        .login-box .action-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .login-error {
            color: #c0392b;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>小说阅读器</h2>
            <form id="login-form" onsubmit="return handleLogin(event)">
                <input type="password" id="token-input" placeholder="请输入 Token" autofocus>
                <button type="submit" class="action-btn">登 录</button>
            </form>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <script>
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        if (getCookie('auth_token')) {
            window.location.href = 'index.html';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const token = document.getElementById('token-input').value.trim();
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';

            if (!token) {
                errorEl.textContent = '请输入 Token';
                return false;
            }

            try {
                const response = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                if (response.ok) {
                    window.location.href = 'index.html';
                } else {
                    const data = await response.json();
                    errorEl.textContent = data.detail || '登录失败';
                }
            } catch (error) {
                errorEl.textContent = '网络错误，请重试';
            }

            return false;
        }
    </script>
</body>
</html>
