<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式小说阅读器</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .book-card {
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-light);
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
            padding: 4px 6px;
            line-height: 1;
            z-index: 2;
        }

        .book-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #e74c3c;
        }

        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-dialog {
            background: #fff;
            border-radius: 10px;
            padding: 28px 32px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.18);
            text-align: center;
        }

        .confirm-dialog p {
            margin: 0 0 20px;
            font-size: 16px;
            color: var(--text-color);
        }

        .confirm-dialog .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .confirm-dialog button {
            padding: 8px 24px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .confirm-dialog .btn-cancel {
            background: #eee;
            color: var(--text-color);
        }

        .confirm-dialog .btn-cancel:hover {
            background: #ddd;
        }

        .confirm-dialog .btn-confirm {
            background: #e74c3c;
            color: #fff;
        }

        .confirm-dialog .btn-confirm:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <a class="nav-btn active" href="index.html">📚 我的书架</a>
        <a class="nav-btn" href="read.html">🔗 输入阅读</a>
    </div>

    <button id="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏"></button>
    <script src="sidebar.js"></script>
    <script>initSidebarState();</script>

    <div id="main-content">
        <div style="max-width: 900px; margin: 0 auto;">
            <h2>最近阅读</h2>
            <div id="bookshelf-container">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <div id="confirm-overlay" class="confirm-overlay">
        <div class="confirm-dialog">
            <p id="confirm-message">确定要删除这本书吗？</p>
            <div class="btn-group">
                <button class="btn-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-confirm" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let pendingDeleteId = null;

        function showConfirm(id, bookName) {
            pendingDeleteId = id;
            document.getElementById('confirm-message').textContent = `确定要删除「${bookName}」吗？`;
            document.getElementById('confirm-overlay').classList.add('active');
        }

        function closeConfirm() {
            pendingDeleteId = null;
            document.getElementById('confirm-overlay').classList.remove('active');
        }

        async function confirmDelete() {
            if (pendingDeleteId === null) return;
            const id = pendingDeleteId;
            closeConfirm();
            try {
                const response = await fetch(`${API_BASE}/records/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadBookshelf();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                console.error('删除失败:', error);
                alert('删除失败');
            }
        }

        async function loadBookshelf() {
            const container = document.getElementById('bookshelf-container');
            container.innerHTML = '<p>正在获取书籍记录...</p>';

            try {
                const response = await fetch(`${API_BASE}/records`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    container.innerHTML = '<p>书架空空如也。</p>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'book-card';
                    card.href = 'chapter.html?url=' + encodeURIComponent(item.chapter_url);

                    card.innerHTML = `
                        <button class="delete-btn" title="删除" onclick="event.preventDefault();event.stopPropagation();showConfirm(${item.id}, '${item.book_name.replace(/'/g, "\\'")}')">✕</button>
                        <div class="book-title">${item.book_name}</div>
                        <div class="book-meta">
                            <span>最新进度: ${item.chapter_name}</span>
                            <span>更新: ${item.update_time}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('获取书架失败:', error);
                container.innerHTML = `<p style="color: red;">无法连接到本地接口，请确认服务已启动。</p>`;
            }
        }

        window.onload = function() {
            loadBookshelf();
        };
    </script>
</body>
</html>
